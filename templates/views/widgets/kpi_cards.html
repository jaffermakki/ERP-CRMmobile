<div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm relative overflow-hidden group">
    <div class="flex justify-between items-start">
        <div>
            <p class="text-sm font-medium text-gray-500 mb-1">Today's Revenue</p>
            <h3 class="text-2xl font-bold text-gray-900">${{ metrics.today_revenue }}</h3>
        </div>
        <div class="p-3 bg-green-50 rounded-lg text-green-600">
            <i data-lucide="dollar-sign" class="w-5 h-5"></i>
        </div>
    </div>
    <div class="mt-4 flex items-center text-sm">
        <span class="text-green-600 font-medium flex items-center">
            <i data-lucide="trending-up" class="w-4 h-4 mr-1"></i> {{ metrics.revenue_growth }}%
        </span>
        <span class="text-gray-400 ml-2">vs yesterday</span>
    </div>
</div>
